name: Update Major Version
run-name: Move major tag to ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target release tag (example: 3.0.0)"
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Fetch tags
        run: git fetch --tags

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect major version
        id: version
        run: |
          TAG="${{ github.event.inputs.target }}"

          echo "Target tag: $TAG"

          # Remove 'v' if present
          VERSION=${TAG#v}

          # Extract major version
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          MAJOR_TAG="v$MAJOR"

          echo "Major tag: $MAJOR_TAG"

          echo "major_tag=$MAJOR_TAG" >> $GITHUB_OUTPUT

      - name: Update major tag
        run: |
          git tag -f ${{ steps.version.outputs.major_tag }} ${{ github.event.inputs.target }}

      - name: Push updated tag
        run: |
          git push origin ${{ steps.version.outputs.major_tag }} --force